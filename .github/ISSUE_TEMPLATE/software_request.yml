name: 软件收录请求
description: 推荐一个 macOS 软件收录到本 tap
title: "[收录请求] "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: pre-check
    attributes:
      label: 提交前确认
      options:
        - label: 该软件**未被** [homebrew-cask](https://formulae.brew.sh/cask/) 官方收录（可通过 `brew search <name>` 确认）
          required: true
        - label: 该软件上游作者**没有**自建 Homebrew tap
          required: true

  - type: input
    id: app-name
    attributes:
      label: 软件名称
      placeholder: 例如: Example App
    validations:
      required: true

  - type: input
    id: app-url
    attributes:
      label: 官网或下载页地址
      placeholder: https://example.com/download
    validations:
      required: true

  - type: input
    id: update-url
    attributes:
      label: 版本更新源地址（如有）
      description: GitHub Releases 页面、Sparkle appcast URL、或包含版本号的下载页
      placeholder: 例如: https://github.com/owner/repo/releases 或 appcast XML URL
    validations:
      required: false

  - type: dropdown
    id: update-source
    attributes:
      label: 更新源类型（如已知）
      options:
        - GitHub Releases
        - Sparkle appcast
        - 仅官网下载页
        - 不确定
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      placeholder: 任何有助于收录的信息，例如：为什么官方 cask 未收录、该软件的特点、macOS 兼容性等
    validations:
      required: false
