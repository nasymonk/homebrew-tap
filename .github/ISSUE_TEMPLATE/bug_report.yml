name: 问题反馈
description: 报告 cask 安装失败、版本过旧、校验错误等问题
title: "[问题] "
labels: ["bug"]
body:
  - type: checkboxes
    id: pre-check
    attributes:
      label: 提交前确认
      options:
        - label: 已运行 `brew update` 并重试
          required: true

  - type: input
    id: cask-name
    attributes:
      label: 涉及的 Cask
      placeholder: 例如: aio-coding-hub
    validations:
      required: true

  - type: input
    id: upstream-url
    attributes:
      label: 官网链接 / 下载链接
      placeholder: 便于维护者定位上游资源
    validations:
      required: false

  - type: dropdown
    id: issue-type
    attributes:
      label: 问题类型
      options:
        - 安装 / 升级失败
        - 版本过旧（未自动更新）
        - SHA256 校验失败
        - 下载链接失效
        - 卸载问题
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 请详细描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 终端输出
      description: 粘贴相关的命令和输出
      placeholder: |
        $ brew install --cask nasymonk/tap/xxx
        Error: ...
      render: shell
    validations:
      required: false

  - type: input
    id: homebrew-version
    attributes:
      label: Homebrew 版本
      placeholder: 运行 `brew --version` 获取
    validations:
      required: false

  - type: input
    id: macos-version
    attributes:
      label: macOS 版本与芯片
      placeholder: 例如: macOS 15.4 / Apple M4
    validations:
      required: false
